<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>学校の片づけ術 チェックテスト</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<main id="app">

  <section id="screen-gate">
    <h1>学校の片づけ術 チェックテスト</h1>
    <div class="card">
      <p>この単発テストは、講演会でご案内した合言葉を入力した方のみご利用いただけます。</p>
      <label for="gate-input">合言葉</label>
      <input id="gate-input" placeholder="合言葉を入力" autocomplete="off">
      <button id="btn-gate" class="primary">進む</button>
      <p id="gate-error" class="error" hidden></p>
    </div>
  </section>

  <section id="screen-start" hidden>
    <h1>学校の片づけ術 チェックテスト</h1>
    <div class="card">
      <p>学校片づけアドバイザー・<strong>伊藤寛子</strong>さんの講演資料「片づけから始める学校の働き方改革」(群馬県公立小中学校事務職員研究会)をもとに、学校の片付けの考え方を9問で確認する単発テストです。</p>
      <p class="note">出題は毎回、同じ論点の中からランダムに変わります。学習コードは不要で、結果はどこにも保存されません。</p>
      <button id="btn-start" class="primary">テストを始める(全9問)</button>
    </div>
    <div class="card">
      <h2>出典</h2>
      <p class="note">・伊藤寛子氏 講演資料「片づけから始める学校の働き方改革」(群馬県公立小中学校事務職員研究会)<br>
      設問文はこの講演資料の内容をもとにした独自作成です。</p>
    </div>
  </section>

  <section id="screen-test" hidden>
    <p id="test-progress" class="note"></p>
    <p id="q-badge"></p>
    <h2 id="q-text"></h2>
    <div id="q-choices"></div>
    <div id="q-feedback" hidden>
      <p id="q-verdict"></p>
      <p id="q-explanation"></p>
      <p id="q-reference" class="note"></p>
      <button id="btn-next" class="primary">次へ</button>
    </div>
  </section>

  <section id="screen-result" hidden>
    <h1 id="result-verdict"></h1>
    <p id="result-score"></p>
    <div id="result-domains"></div>
    <button id="btn-again" class="primary">別の類題でもう一度</button>
    <button id="btn-top">最初の画面に戻る</button>
  </section>

</main>
<script type="module" src="js/katazuke.js"></script>
</body>
</html>
